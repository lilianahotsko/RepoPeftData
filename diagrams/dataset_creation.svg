<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <linearGradient id="gb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/><stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="gc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccfbf1"/><stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Dataset Creation Pipeline</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">build_commit_assertion_db.py — Builds SQLite DB from git repos + split files</text>

  <!-- ================================================================== -->
  <!-- INPUTS -->
  <!-- ================================================================== -->
  <text x="50" y="90" font-size="14" font-weight="bold" fill="#475569">Inputs</text>

  <!-- Split files -->
  <rect x="50" y="100" width="200" height="80" rx="10" fill="url(#gb)" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Split JSON Files</text>
  <text x="150" y="140" text-anchor="middle" font-size="9" fill="#3b82f6">train.json, cr_val.json</text>
  <text x="150" y="153" text-anchor="middle" font-size="9" fill="#3b82f6">cr_test.json, ir_val.json</text>
  <text x="150" y="166" text-anchor="middle" font-size="9" fill="#3b82f6">ir_test.json (or gru_* prefixed)</text>

  <!-- Git repos -->
  <rect x="300" y="100" width="200" height="80" rx="10" fill="url(#gg)" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Git Repositories</text>
  <text x="400" y="140" text-anchor="middle" font-size="9" fill="#16a34a">$SCRATCH/REPO_DATASET/repositories/</text>
  <text x="400" y="153" text-anchor="middle" font-size="9" fill="#16a34a">owner/repo_name/</text>
  <text x="400" y="166" text-anchor="middle" font-size="9" fill="#16a34a">Full git history + QNA_HYPERNET.json</text>

  <!-- QNA file -->
  <rect x="550" y="100" width="200" height="80" rx="10" fill="url(#go)" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">QNA_HYPERNET.json</text>
  <text x="650" y="140" text-anchor="middle" font-size="9" fill="#b45309">Per-repo assertion pairs</text>
  <text x="650" y="153" text-anchor="middle" font-size="9" fill="#b45309">{prefix, target, metadata:</text>
  <text x="650" y="166" text-anchor="middle" font-size="9" fill="#b45309">{file, lineno}}</text>

  <!-- Config -->
  <rect x="790" y="100" width="140" height="80" rx="10" fill="url(#gr)" stroke="#94a3b8" stroke-width="2"/>
  <text x="860" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Config</text>
  <text x="860" y="140" text-anchor="middle" font-size="9" fill="#64748b">--max-commits: 200</text>
  <text x="860" y="153" text-anchor="middle" font-size="9" fill="#64748b">--diff-mode:</text>
  <text x="860" y="166" text-anchor="middle" font-size="9" fill="#64748b">single_commit|inter_sample</text>

  <!-- Arrows down -->
  <line x1="150" y1="180" x2="150" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="400" y1="180" x2="400" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ================================================================== -->
  <!-- Step 1: Collect repo IDs -->
  <!-- ================================================================== -->
  <rect x="50" y="220" width="270" height="50" rx="10" fill="url(#gr)" stroke="#64748b" stroke-width="2"/>
  <text x="185" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Step 1: Collect Repo IDs</text>
  <text x="185" y="258" text-anchor="middle" font-size="9" fill="#64748b">Union of all repo IDs across split JSON files</text>

  <line x1="185" y1="270" x2="185" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ================================================================== -->
  <!-- PHASE 1: Commits Table -->
  <!-- ================================================================== -->
  <rect x="40" y="305" width="890" height="270" rx="14" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="40" y="305" width="890" height="28" rx="14" fill="#2563eb"/>
  <text x="485" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Phase 1: Build Commits Table + Blame Maps (per repository)</text>

  <!-- Step 2a: Get commit list -->
  <rect x="65" y="345" width="230" height="55" rx="8" fill="url(#gg)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">2a. Get Commit List</text>
  <text x="180" y="380" text-anchor="middle" font-size="9" fill="#16a34a">git log --first-parent --reverse</text>
  <text x="180" y="393" text-anchor="middle" font-size="9" fill="#16a34a">{sha, parent_sha, timestamp} oldest-first</text>

  <line x1="295" y1="372" x2="318" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2b: Sample indices -->
  <rect x="320" y="345" width="200" height="55" rx="8" fill="url(#go)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">2b. Sample Commits</text>
  <text x="420" y="380" text-anchor="middle" font-size="9" fill="#b45309">Uniform sample up to max_commits</text>
  <text x="420" y="393" text-anchor="middle" font-size="9" fill="#b45309">Always includes first + last commit</text>

  <line x1="520" y1="372" x2="548" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2c: Extract diffs -->
  <rect x="550" y="345" width="360" height="55" rx="8" fill="url(#gb)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="730" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">2c. Extract & Filter Diffs</text>
  <text x="730" y="380" text-anchor="middle" font-size="9" fill="#3b82f6">git diff parent child (per sampled commit)</text>
  <text x="730" y="393" text-anchor="middle" font-size="9" fill="#3b82f6">Filter: keep .py/.md/.rst, skip test/vendored dirs</text>

  <!-- Diff modes explanation -->
  <rect x="65" y="410" width="300" height="50" rx="8" fill="#f0f9ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="215" y="428" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Diff Modes</text>
  <text x="215" y="442" text-anchor="middle" font-size="9" fill="#3b82f6">single_commit: diff vs immediate parent (one commit's change)</text>
  <text x="215" y="454" text-anchor="middle" font-size="9" fill="#3b82f6">inter_sample: diff vs previous sampled commit (accumulated changes)</text>

  <!-- Step 2d: Blame mapping -->
  <rect x="400" y="410" width="270" height="65" rx="8" fill="url(#gv)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="535" y="428" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">2d. Git Blame Mapping</text>
  <text x="535" y="443" text-anchor="middle" font-size="9" fill="#7c3aed">git blame --line-porcelain per test file</text>
  <text x="535" y="456" text-anchor="middle" font-size="9" fill="#7c3aed">Maps assertion (prefix,target) -> commit_index</text>
  <text x="535" y="468" text-anchor="middle" font-size="9" fill="#7c3aed">via line number -> introducing SHA -> sampled index</text>

  <!-- Insert to DB -->
  <rect x="700" y="418" width="210" height="48" rx="8" fill="url(#gc)" stroke="#14b8a6" stroke-width="2"/>
  <text x="805" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f766e">INSERT INTO commits</text>
  <text x="805" y="455" text-anchor="middle" font-size="9" fill="#14b8a6">(repo_id, commit_index, sha, diff)</text>

  <line x1="730" y1="400" x2="805" y2="418" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- DB commit every 50 repos -->
  <text x="795" y="477" text-anchor="middle" font-size="8" fill="#64748b">conn.commit() every 50 repos</text>

  <!-- ================================================================== -->
  <!-- PHASE 2: Assertions Table -->
  <!-- ================================================================== -->
  <rect x="40" y="590" width="890" height="180" rx="14" fill="none" stroke="#ec4899" stroke-width="2.5"/>
  <rect x="40" y="590" width="890" height="28" rx="14" fill="#ec4899"/>
  <text x="485" y="609" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Phase 2: Build Assertions Table (idempotent — DELETE + re-INSERT)</text>

  <!-- Iterate splits -->
  <rect x="65" y="630" width="220" height="55" rx="8" fill="url(#gb)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="650" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Iterate Split Files</text>
  <text x="175" y="665" text-anchor="middle" font-size="9" fill="#3b82f6">For each split -> each repo -> each qna_pair</text>
  <text x="175" y="678" text-anchor="middle" font-size="9" fill="#3b82f6">Extract prefix + target strings</text>

  <line x1="285" y1="657" x2="318" y2="657" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Blame lookup -->
  <rect x="320" y="630" width="220" height="55" rx="8" fill="url(#gv)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="650" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Blame-Based Assignment</text>
  <text x="430" y="665" text-anchor="middle" font-size="9" fill="#7c3aed">Look up (prefix, target) in blame_map</text>
  <text x="430" y="678" text-anchor="middle" font-size="9" fill="#7c3aed">Fallback: assign to last sampled commit</text>

  <line x1="540" y1="657" x2="578" y2="657" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Filter -->
  <rect x="580" y="630" width="160" height="55" rx="8" fill="url(#go)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="650" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Filter</text>
  <text x="660" y="665" text-anchor="middle" font-size="9" fill="#b45309">Skip empty prefix/target</text>
  <text x="660" y="678" text-anchor="middle" font-size="9" fill="#b45309">Skip target starting with ","</text>

  <line x1="740" y1="657" x2="768" y2="657" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Insert assertions -->
  <rect x="770" y="635" width="140" height="45" rx="8" fill="url(#gc)" stroke="#14b8a6" stroke-width="2"/>
  <text x="840" y="654" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f766e">INSERT INTO</text>
  <text x="840" y="668" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f766e">assertions</text>

  <!-- Stats -->
  <rect x="65" y="700" width="845" height="45" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="1"/>
  <text x="485" y="718" text-anchor="middle" font-size="10" fill="#86198f">Tracking: n_blame_mapped (assertions traced to introducing commit) vs n_fallback (assigned to last commit)</text>
  <text x="485" y="734" text-anchor="middle" font-size="10" fill="#86198f">Blame provides intermediate supervision: assertions appear at the commit that introduced them</text>

  <!-- ================================================================== -->
  <!-- OUTPUT: SQLite DB Schema -->
  <!-- ================================================================== -->
  <rect x="140" y="790" width="680" height="95" rx="14" fill="url(#gc)" stroke="#0d9488" stroke-width="2.5"/>
  <text x="480" y="815" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f766e">Output: commits_assertions.db (SQLite)</text>

  <!-- commits table -->
  <rect x="165" y="825" width="290" height="48" rx="6" fill="#fff" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="310" y="842" text-anchor="middle" font-size="11" font-weight="600" fill="#0f766e">commits</text>
  <text x="310" y="858" text-anchor="middle" font-size="9" fill="#14b8a6">repo_id | commit_index | commit_sha</text>
  <text x="310" y="869" text-anchor="middle" font-size="9" fill="#14b8a6">production_code_diff (PK: repo_id, commit_index)</text>

  <!-- assertions table -->
  <rect x="505" y="825" width="290" height="48" rx="6" fill="#fff" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="650" y="842" text-anchor="middle" font-size="11" font-weight="600" fill="#0f766e">assertions</text>
  <text x="650" y="858" text-anchor="middle" font-size="9" fill="#14b8a6">repo_id | commit_index | assertion_prefix</text>
  <text x="650" y="869" text-anchor="middle" font-size="9" fill="#14b8a6">assertion_target (FK -> commits)</text>

  <!-- FK arrow -->
  <line x1="505" y1="850" x2="458" y2="850" stroke="#0d9488" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="475" y="845" font-size="8" fill="#0d9488">FK</text>
</svg>
