<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1050" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="g-pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/><stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="g-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="g-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/><stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Commit-Sequential Training Pipeline</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">train_code2lora_gru_commits.py — per-repository, per-commit training loop with truncated BPTT</text>

  <!-- ================================================================== -->
  <!-- EPOCH LOOP -->
  <!-- ================================================================== -->
  <rect x="30" y="75" width="900" height="940" rx="16" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="95" font-size="14" font-weight="bold" fill="#475569">Epoch Loop (e = 0 .. epochs-1)</text>
  <text x="50" y="112" font-size="10" fill="#64748b">shuffle(train_data) at start of each epoch</text>

  <!-- ================================================================== -->
  <!-- REPO LOOP -->
  <!-- ================================================================== -->
  <rect x="55" y="125" width="855" height="660" rx="12" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="75" y="145" font-size="13" font-weight="bold" fill="#1d4ed8">Repository Loop (ri = 0 .. num_repos-1)</text>

  <!-- Init h_0 -->
  <rect x="80" y="160" width="220" height="45" rx="8" fill="url(#g-orange)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="190" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Initialize h_0</text>
  <text x="190" y="195" text-anchor="middle" font-size="9" fill="#b45309">zeros [num_layers, 1, H]</text>

  <line x1="300" y1="182" x2="338" y2="182" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ================================================================== -->
  <!-- COMMIT LOOP -->
  <!-- ================================================================== -->
  <rect x="340" y="155" width="545" height="470" rx="10" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="360" y="175" font-size="12" font-weight="bold" fill="#166534">Commit Loop (k = 0 .. n_commits-1)</text>

  <!-- Step a: Embed diff -->
  <rect x="365" y="190" width="250" height="50" rx="8" fill="url(#g-blue)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">a. Embed Diff (frozen)</text>
  <text x="490" y="226" text-anchor="middle" font-size="9" fill="#3b82f6">DiffEmbedder: diff_text -> [1, 2D]</text>
  <text x="490" y="236" text-anchor="middle" font-size="8" fill="#64748b">Chunk + Qwen3 encoder + MaxPool||MeanPool</text>

  <line x1="490" y1="240" x2="490" y2="258" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step b: GRU step -->
  <rect x="365" y="260" width="250" height="45" rx="8" fill="url(#g-green)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">b. GRU Streaming Step</text>
  <text x="490" y="296" text-anchor="middle" font-size="9" fill="#16a34a">h_k = encode_repository_commit(diff_emb, h_{k-1})</text>

  <!-- Recurrence arrow -->
  <path d="M 615 280 Q 660 280 660 260 Q 660 245 640 245 Q 620 245 620 260" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <text x="665" y="260" font-size="8" fill="#16a34a">h_k -> h_{k+1}</text>

  <line x1="490" y1="305" x2="490" y2="323" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step c: Collect assertions -->
  <rect x="365" y="325" width="250" height="45" rx="8" fill="url(#g-gray)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="490" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">c. Collect Assertions</text>
  <text x="490" y="361" text-anchor="middle" font-size="9" fill="#64748b">all assertions with commit_index <= k (cumulative)</text>

  <!-- Decision diamond -->
  <polygon points="490,385 545,410 490,435 435,410" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="490" y="413" text-anchor="middle" font-size="9" fill="#334155">assertions?</text>

  <!-- No assertions path -->
  <line x1="545" y1="410" x2="660" y2="410" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="662" y="395" width="100" height="30" rx="6" fill="url(#g-red)" stroke="#dc2626" stroke-width="1"/>
  <text x="712" y="413" text-anchor="middle" font-size="9" fill="#991b1b">h = h.detach()</text>
  <text x="600" y="405" font-size="9" fill="#dc2626">no</text>

  <!-- Loop back from detach to next commit -->
  <path d="M 762 410 Q 820 410 820 320 Q 820 195 670 195 L 620 195" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2" fill="none" marker-end="url(#arr-red)"/>
  <text x="825" y="310" font-size="8" fill="#dc2626" transform="rotate(90, 825, 310)">next commit</text>

  <!-- Yes path -->
  <line x1="490" y1="435" x2="490" y2="458" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="500" y="450" font-size="9" fill="#16a34a">yes</text>

  <!-- Step d: Generate LoRA -->
  <rect x="365" y="460" width="250" height="45" rx="8" fill="url(#g-pink)" stroke="#ec4899" stroke-width="1.5"/>
  <text x="490" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">d. Generate LoRA from h_k</text>
  <text x="490" y="496" text-anchor="middle" font-size="9" fill="#be185d">PAW trunk -> coefficients -> basis mixing</text>

  <line x1="490" y1="505" x2="490" y2="523" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step e: Apply hooks + LM loss -->
  <rect x="365" y="525" width="250" height="60" rx="8" fill="url(#g-purple)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="490" y="545" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">e. LM Loss Computation</text>
  <text x="490" y="560" text-anchor="middle" font-size="9" fill="#7c3aed">apply_lora_hooks -> forward pass</text>
  <text x="490" y="573" text-anchor="middle" font-size="9" fill="#7c3aed">CE loss per assertion, backward=True</text>
  <text x="490" y="583" text-anchor="middle" font-size="8" fill="#6d28d9">(loss/N).backward() — immediate per-assertion</text>

  <!-- Detach after loss -->
  <rect x="662" y="545" width="100" height="30" rx="6" fill="url(#g-red)" stroke="#dc2626" stroke-width="1"/>
  <text x="712" y="563" text-anchor="middle" font-size="9" fill="#991b1b">h = h.detach()</text>
  <line x1="615" y1="555" x2="658" y2="555" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="637" y="548" font-size="8" fill="#64748b">then</text>

  <!-- END COMMIT LOOP -->

  <!-- ================================================================== -->
  <!-- Gradient Accumulation + Optimizer Step -->
  <!-- ================================================================== -->
  <rect x="80" y="640" width="400" height="120" rx="10" fill="url(#g-gray)" stroke="#475569" stroke-width="2"/>
  <text x="280" y="662" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Gradient Accumulation + Optimizer Step</text>
  <text x="280" y="680" text-anchor="middle" font-size="10" fill="#475569">Every grad_accum repos:</text>

  <text x="100" y="700" font-size="10" fill="#334155">1. Normalize grads: p.grad /= accum_count</text>
  <text x="100" y="716" font-size="10" fill="#334155">2. Clip gradients: clip_grad_norm_(params, max_norm=5.0)</text>
  <text x="100" y="732" font-size="10" fill="#334155">3. AdamW step (lr=1e-4, wd=0.01)</text>
  <text x="100" y="748" font-size="10" fill="#334155">4. Cosine LR schedule with warmup (3%)</text>

  <!-- Eval block -->
  <rect x="520" y="640" width="360" height="120" rx="10" fill="url(#g-blue)" stroke="#2563eb" stroke-width="2"/>
  <text x="700" y="662" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Periodic Evaluation</text>
  <text x="700" y="682" text-anchor="middle" font-size="10" fill="#3b82f6">Every eval_steps optimizer steps:</text>

  <text x="540" y="702" font-size="10" fill="#1e40af">1. evaluate_commit_sequential() on eval repos</text>
  <text x="540" y="718" font-size="10" fill="#1e40af">2. Commit-sequential eval (same loop, no grad)</text>
  <text x="540" y="734" font-size="10" fill="#1e40af">3. Save best checkpoint if eval_loss improves</text>
  <text x="540" y="750" font-size="10" fill="#1e40af">4. Log to W&B: eval/loss, eval_repos, commits</text>

  <!-- ================================================================== -->
  <!-- End of Epoch -->
  <!-- ================================================================== -->
  <rect x="55" y="800" width="855" height="95" rx="10" fill="url(#g-orange)" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="825" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">End of Epoch</text>

  <g transform="translate(80, 835)">
    <text x="0" y="12" font-size="10" fill="#78350f">1. Flush remaining accumulated gradients</text>
    <text x="0" y="28" font-size="10" fill="#78350f">2. End-of-epoch evaluation on full eval set</text>
    <text x="350" y="12" font-size="10" fill="#78350f">3. Save epoch checkpoint (code2lora_gru_epochN.pt)</text>
    <text x="350" y="28" font-size="10" fill="#78350f">4. Save best checkpoint if eval_loss improved</text>
    <text x="350" y="44" font-size="10" fill="#78350f">5. Log epoch_loss to W&B</text>
  </g>

  <!-- Final save -->
  <rect x="55" y="910" width="855" height="50" rx="10" fill="url(#g-green)" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="935" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Save Final Checkpoint: code2lora_gru_final.pt</text>
  <text x="480" y="950" text-anchor="middle" font-size="10" fill="#16a34a">Contains: model_state_dict, model_config, optimizer_state_dict, target_module_keys, epoch, global_step, best_eval_loss</text>

  <!-- Legend -->
  <g transform="translate(55, 975)">
    <rect x="0" y="0" width="855" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="18" font-size="10" font-weight="bold" fill="#334155">Key Details:</text>
    <text x="20" y="34" font-size="9" fill="#64748b">Frozen models: Qwen3-Embedding-0.6B (diff encoder), Qwen2.5-Coder-1.5B (base LM for loss)</text>
    <text x="20" y="46" font-size="9" fill="#64748b">Trainable: Code2LoRAGRU only (GRU + LoRA Generator). Truncated BPTT: h detached after each commit step.</text>
    <text x="450" y="34" font-size="9" fill="#64748b">Loss: Cross-entropy on assertion targets (prefix as context, target as prediction)</text>
    <text x="450" y="46" font-size="9" fill="#64748b">LoRA applied via forward hooks to 7 module types across 28 layers of the base LM</text>
  </g>
</svg>
